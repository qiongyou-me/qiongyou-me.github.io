<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>便民服务中心 - 千山年卡</title>
<style>
  /* 全局样式 */
  * {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",Arial,Helvetica,sans-serif;}
  body {background:#f0f2f5;padding:20px 10px;}
  
  /* 卡片容器 */
  .service-card {
    background:#ffffff;
    border-radius:20px;
    padding:30px 20px;
    max-width:380px;
    margin:0 auto;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
  }

  /* 标题区域 */
  .header {text-align:center;margin-bottom:28px;}
  .title {
    font-size:20px;
    color:#1f2329;
    font-weight:bold;
    margin-bottom:8px;
  }
  .sub-title {
    font-size:14px;
    color:#86909c;
  }

  /* 按钮网格布局 */
  .grid {
    display:grid;
    grid-template-columns:1fr;
    gap:16px; /* 按钮间距 */
  }

  /* 按钮通用样式 */
  .btn {
    display:flex;
    align-items:center;
    justify-content:center;
    gap:12px; /* 图标和文字间距 */
    padding:16px 20px;
    border-radius:14px;
    text-decoration:none;
    font-size:16px;
    font-weight:500;
    transition:all 0.2s ease;
    text-align:center;
  }

  /* 主按钮（年卡入口） */
  .btn-primary {
    background:#4080ff;
    color:#ffffff;
  }
  .btn-primary:active {background:#3070e6;}

  /* 次按钮（其他入口） */
  .btn-secondary {
    background:#f5f7fa;
    color:#1f2329;
  }
  .btn-secondary:active {background:#e5e6ea;}

  /* 图标样式 */
  .icon {
    width:24px;
    height:24px;
    flex-shrink:0; /* 防止缩放 */
  }
</style>
</head>
<body>

<div class="service-card">
  <div class="header">
    <div class="title">便民服务中心</div>
    <div class="sub-title">千山年卡 - 官方直达入口</div>
  </div>

  <div class="grid">
    <!-- 核心按钮：一键跳转到千山公众号文章 -->
    <a class="btn btn-primary" href="https://mp.weixin.qq.com/s/AIbLeHOprqezR5oQfsj5kA" target="_self">
      <!-- svg图标 -->
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
      <span>千山年卡办理</span>
    </a >

    <!-- 辅助按钮：其他便民服务 -->
    <a class="btn btn-secondary" href="http://www.anshan.gov.cn" target="_blank">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="#333333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V6a2 2 0 0 1 2-2h5"/>
      </svg>
      <span>政务咨询</span>
    </a >
  </div>
</div>

</body>
</html>
