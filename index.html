<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实用应用导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: sans-serif;
        }
        body {
            background: linear-gradient(135deg, #e8edf3, #dce3ec);
            padding: 20px;
        }
        .search-box {
            background: #fff;
            border-radius: 24px;
            padding: 10px 16px;
            margin-bottom: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .search-box input {
            width: 100%;
            border: none;
            outline: none;
            font-size: 16px;
            background: transparent;
        }
        .section {
            margin-bottom: 30px;
        }
        .title {
            font-size: 19px;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
            border-left: 4px solid #4285F4;
            padding-left: 10px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }
        .item {
            background: #fff;
            border: none;
            border-radius: 12px;
            padding: 15px 0;
            font-size: 16px;
            color: #333;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .item:hover {
            background: #f0f4ff;
        }
    </style>
</head>

<div class="search-box">
    <input type="text" value="实用应用导航" readonly>
</div>
