<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>便民服务中心</title>
<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",Arial;}
body {background:#f0f5ff;padding:20px 10px;}
.card {background:#fff;border-radius:22px;padding:32px 28px;max-width:340px;margin:0 auto;box-shadow:0 8px 26px rgba(120,140,180,0.13);}
.title-box {text-align:center;margin-bottom:34px;}
.title {font-size:22px;color:#3c4866;margin-bottom:16px;}
.title-line {width:76px;height:2px;margin:0 auto;background:#72b2ffa3;border-radius:1px;}
.grid {display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn {display:flex;align-items:center;gap:6px;padding:0 10px;height:70px;border-radius:14px;text-decoration:none;white-space:nowrap;position:relative;}
.btn-primary {background:linear-gradient(135deg,#8d97ff,#72b2ff);color:#fff;}
.btn-secondary {background:#fff;border:1px solid #d0d0d0;color:#5a5a5a;}
.icon {width:22px;height:22px;stroke-width:2;stroke:currentColor;fill:none;flex-shrink:0;}
.badge::after {content:'';position:absolute;top:0;right:-7px;width:7px;height:7px;background:#ff4548;border-radius:50%;box-shadow:0 1px 2px rgba(255,69,72,0.3);}
</style>
</head>
<body>

<div class="card">
  <div class="title-box">
    <div class="title">便民服务中心</div>
    <div class="title-line"></div>
  </div>

  <div class="grid">
    <!-- 千山年卡 - 已换成微信官方短链 -->
    <a class="btn btn-primary" href="https://weixin.qq.com/s/AIbLeHOprqezR5oQfsj5kA" target="_blank">
      <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
      <span>年卡办理</span>
    </a >

    <!-- 公积金查询 -->
    <a class="btn btn-secondary badge" href="http://asgjj.anshan.gov.cn:443/wt-web/grlogin" target="_blank">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 2a10 10 0 100 20 10 10 0 000-20z"/></svg>
      <span>公积金查询</span>
    </a >

    <!-- 医保服务 -->
    <a class="btn btn-secondary badge" href="http://ybj.anshan.gov.cn/" target="_blank">
      <svg class="icon icon-light" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>医保服务</span>
    </a >

    <!-- 交管业务 -->
    <a class="btn btn-secondary" href="https://ln.122.gov.cn/" target="_blank">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"/><line x1="12" y1="8" x2="12" y2="12"/></svg>
      <span>交管业务</span>
    </a >

    <!-- 政务咨询 -->
    <a class="btn btn-primary" href="http://www.anshan.gov.cn" target="_blank">
      <svg class="icon icon-up" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
      <span>政务咨询</span>
    </a >

    <!-- 票务服务 -->
    <a class="btn btn-secondary" href="https://www.12306.cn" target="_blank">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12 2L3 9v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9l-9-7z"/></svg>
      <span>票务服务</span>
    </a >

    <!-- 天气查询 -->
    <a class="btn btn-secondary" href="https://www.weather.com.cn/weather/101071001.shtml" target="_blank">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="2.56"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
      <span>天气查询</span>
    </a >

    <!-- 维权投诉 -->
    <a class="btn btn-secondary" href="https://www.12315.cn" target="_blank">
      <svg class="icon icon-light" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
      <span>维权投诉</span>
    </a >
  </div>
</div>

</body>
</html>
