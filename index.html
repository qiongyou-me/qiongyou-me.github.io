<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>穹游 - 广阔天地 自在人生</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
        }
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            text-align: center;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            color: #00d4ff;
            letter-spacing: 5px;
        }
        .slogan {
            font-size: 1.5rem;
            color: #a0a0a0;
            margin-bottom: 3rem;
            line-height: 1.8;
        }
        .meaning {
            font-size: 1.2rem;
            line-height: 2;
            color: #e0e0e0;
            text-align: left;
            padding: 30px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            border-left: 4px solid #00d4ff;
        }
        .footer {
            margin-top: 4rem;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>穹游</h1>
        <div class="slogan">心怀苍穹，不逐浮华，行而不辍</div>
        
        <div class="meaning">
            <p>穹，是浩瀚无垠的天地，更是宽广通透的眼界与心界。</p >
            <p>游，是无拘无束的行走，也是不被定义的体验与探索。</p >
            <br>
            <p>穹游，就是挣脱世俗的捆绑，在广阔天地间找到自己的节奏；在行走中清醒，在体验中沉淀，在热爱中发光。</p >
            <p>不必被标准定义，不必被他人裹挟，不必困在方寸之地。</p >
            <p>看更广的世界，做更真的自己，活出自在、坦荡、热烈的一生。</p >
        </div>

        <div class="footer">
            © 2026 穹游 | 广阔天地，自在人生
        </div>
    </div>
</body>
</html>
