<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全能便民导航</title>
    <style>
        /* --- 基础样式 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f2f3f5; color: #333; padding-bottom: 30px; }
        .container { max-width: 600px; margin: 0 auto; }

        /* --- 头部 --- */
        .header { background-color: #fff; padding: 20px 15px; text-align: center; }
        .logo-area { font-size: 20px; font-weight: bold; color: #555; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .search-bar { background: #f5f5f5; border-radius: 20px; padding: 8px 15px; color: #888; font-size: 14px; text-align: left; }
        .search-engines { display: flex; justify-content: space-around; margin-top: 15px; font-size: 13px; color: #666; }
        .search-engines span { padding: 4px 10px; background: #e0e0e0; border-radius: 4px; }
        .search-engines span.active { background: #007bff; color: white; }

        /* --- 卡片容器 --- */
        .card {
            background: #fff;
            margin: 10px 15px;
            border-radius: 12px;
            padding: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            overflow: hidden; /* 关键：防止内容溢出圆角 */
            transition: all 0.3s ease;
        }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .section-title { font-size: 16px; font-weight: bold; display: flex; align-items: center; }
        .section-title::before { content: ''; display: block; width: 4px; height: 16px; background: #ff5722; margin-right: 8px; border-radius: 2px; }

        /* --- 展开/收起 按钮样式 --- */
        .toggle-btn {
            font-size: 12px;
            color: #666;
            background: #f5f5f5;
            padding: 4px 10px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            transition: color 0.2s;
        }
        .toggle-btn:hover { color: #ff5722; }
        .toggle-btn i { margin-left: 4px; font-style: normal; font-size: 10px; transition: transform 0.2s; }
        
        /* 展开时的箭头旋转 */
        .card.expanded .toggle-btn i { transform: rotate(180deg); }

        /* --- 网格布局 --- */
        .grid-container { display: flex; flex-wrap: wrap; justify-content: space-between; }
        
        /* 大图标 (快捷入口) */
        .grid-lg .item { width: 30%; text-align: center; margin-bottom: 15px; }
        .grid-lg .icon { width: 50px; height: 50px; margin: 0 auto 8px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }

        /* 小图标 (应用列表) */
        .grid-sm .item { width: 23%; text-align: center; margin-bottom: 15px; }
        .grid-sm .icon { width: 45px; height: 45px; margin: 0 auto 8px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .item span { display: block; font-size: 12px; color: #333; line-height: 1.4; }

        /* --- 颜色定义 --- */
        .bg-blue { background-color: #e3f2fd; color: #1976d2; }
        .bg-green { background-color: #e8f5e9; color: #43a047; }
        .bg-orange { background-color: #fff3e0; color: #fb8c00; }
        .bg-purple { background-color: #f3e5f5; color: #8e24aa; }
        .bg-red { background-color: #ffebee; color: #e53935; }
        .bg-teal { background-color: #e0f2f1; color: #00897b; }
