<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>穹游 · 世界中文报纸导航</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #050508; color: #e0e0e0;
        overflow-x: hidden; line-height: 1.6;
    }
    .glass {
        backdrop-filter: blur(18px) saturate(120%);
        -webkit-backdrop-filter: blur(18px);
        background: rgba(15, 15, 25, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .header {
        position: fixed; top: 0; left: 0; width: 100%;
        padding: 22px 0; text-align: center;
        font-size: 26px; font-weight: 800;
        letter-spacing: 2px; z-index: 100;
        border-bottom: 1px solid rgba(138, 166, 255, 0.2);
    }
    .header span { color: #8AA6FF; }
    .container {
        max-width: 1200px; margin: 90px auto 120px;
        padding: 20px; display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 20px;
    }
    .card {
        padding: 26px; border-radius: 20px;
        position: relative; overflow: hidden;
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .card:hover {
        transform: translateY(-6px) scale(1.01);
        box-shadow: 0 0 35px rgba(138, 166, 255, 0.25),
                    inset 0 1px 0 rgba(255,255,255,0.1);
        border-color: rgba(138, 166, 255, 0.5);
    }
    .card::after {
        content: ""; position: absolute; top: 0; left: 0;
        width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent,
                    rgba(138, 166, 255, 0.1) 50%, transparent);
        transition: all 0.8s ease; opacity: 0;
    }
    .card:hover::after { opacity: 1; left: 100%; }
    .card-title {
        font-size: 19px; font-weight: 700; margin-bottom: 22px;
        color: #fff; display: flex; align-items: center; gap: 12px;
    }
    .card-title::before {
        content: ""; display: inline-block;
        width: 5px; height: 26px; background: #8AA6FF;
        border-radius: 3px;
    }
    .item {
        display: block; padding: 14px 18px; margin: 12px 0;
        border-radius: 14px; color: #ccc; text-decoration: none;
        font-size: 15px; transition: all 0.2s;
        border: 1px solid transparent;
        cursor: pointer; /* 明确指针 */
    }
    .item:active { transform: scale(0.97); background: rgba(138, 166, 255, 0.15); }
    .item:hover {
        color: #8AA6FF; border-color: rgba(138, 166, 255, 0.3);
        background: rgba(138, 166, 255, 0.08);
    }

    /* 🔹 悬浮播放器核心样式 */
    .floating-player {
        position: fixed;
        bottom: 30px;
        right: 30px;
        z-index: 9999; /* 最高层级 */
        transition: all 0.3s ease;
    }
    .player-drag-handle {
        width: 140px;
        height: 140px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: move; /* 拖动图标 */
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        box-shadow: 0 10px 30px rgba(138, 166, 255, 0.3),
                    inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }
    .player-drag-handle:hover {
        transform: scale(1.05);
        box-shadow: 0 15px 40px rgba(138, 166, 255, 0.4),
                    inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }
    .player-content {
        text-align: center;
        color: white;
    }
    .player-title {
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        text-shadow: 0 1px 2px rgba(0,0,0,0.5);
    }
    .player-btn {
        background: none;
        border: none;
        color: white;
        font-size: 24px;
        cursor: pointer;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: rgba(138, 166, 255, 0.2);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
    }
    .player-btn:hover {
        background: rgba(138, 166, 255, 0.4);
    }
    .player-status {
        font-size: 12px;
        margin-top: 5px;
        opacity: 0.8;
    }
</style>
</head>
<body>

<div class="header glass">穹游 · 世界<span>中文报纸</span>导航</div>

<div class="container">

    <!-- 🏛️ 国内权威报纸 -->
    <div class="card glass">
        <div class="card-title">🏛️ 国内权威</div>
        <a class="item glass" data-audio="https://alive.cctv.com/live/cctv13/index.m3u8" target="_blank">📰 人民日报（央广同步）</a >
        <a class="item glass" data-audio="https://audio.cnr.cn/live/xinwenwang.m3u8" target="_blank">📰 光明日报（央广新闻）</a >
        <a class="item glass" data-audio="https://alive.cctv.com/live/cctv13/index.m3u8" target="_blank">📰 解放军报（央视同步）</a >
        <a class="item glass" data-audio="https://audio.cnr.cn/live/rmrb.m3u8" target="_blank">📰 人民网（人民日报音频）</a >
    </div>

    <!-- 🌏 全球中文视野 -->
    <div class="card glass">
        <div class="card-title">🌏 全球中文</div>
        <a class="item glass" data-audio="https://www.zaobao.com.sg/rss/audio" target="_blank">📰 联合早报（新加坡）</a >
        <a class="item glass" data-audio="https://alive.cctv.com/live/cctv4/index.m3u8" target="_blank">📰 人民日报海外版（央视4台）</a >
        <a class="item glass" data-audio="https://audio.cnr.cn/live/chinadaily.m3u8" target="_blank">📰 中国日报（音频版）</a >
        <a class="item glass" data-audio="https://alive.cctv.com/live/cctv13/index.m3u8" target="_blank">📰 凤凰网（同步央广）</a >
    </div>

    <!-- 📰 国际主流媒体中文版 -->
    <div class="card glass">
        <div class="card-title">🌍 国际中文</div>
        <a class="item glass" data-audio="https://cn.wsj.com/audio" target="_blank">📰 华尔街日报中文版</a >
        <a class="item glass" data-audio="https://www.ftchinese.com/audio" target="_blank">📰 FT中文网（金融时报）</a >
        <a class="item glass" data-audio="https://cn.reuters.com/audio" target="_blank">📰 路透中文网</a >
        <a class="item glass" data-audio="https://www.afp.com/zh/audio" target="_blank">📰 法新社中文</a >
    </div>

    <!-- 📚 深度阅读 -->
    <div class="card glass">
        <div class="card-title">📚 深度阅读</div>
        <a class="item glass" data-audio="https://www.cyol.com/audio" target="_blank">📰 中国青年报</a >
        <a class="item glass" data-audio="https://www.stdaily.com/audio" target="_blank">📰 科技日报</a >
        <a class="item glass" data-audio="https://www.workercn.cn/audio" target="_blank">📰 工人日报</a >
        <a class="item glass" data-audio="https://www.farmer.com.cn/audio" target="_blank">📰 农民日报</a >
    </div>

</div>

<!-- 🔊 全局悬浮播放器 -->
<div class="floating-player glass" id="floatingPlayer">
    <div class="player-drag-handle glass" id="playerHandle">
        <div class="player-content">
            <div class="player-title" id="playerSource">选择报纸播放</div>
            <button class="player-btn" id="playerBtn">▶</button>
            <div class="player-status" id="playerStatus">状态：待机</div>
        </div>
    </div>
</div>

<!-- 隐藏的音频核心 -->
<audio id="globalAudio" loop>

<script>
    // 🔹 播放器核心变量
    const audio = document.getElementById('globalAudio');
    const player = document.getElementById('floatingPlayer');
    const handle = document.getElementById('playerHandle');
    const playerBtn = document.getElementById('playerBtn');
    const playerSource = document.getElementById('playerSource');
    const playerStatus = document.getElementById('playerStatus');
    
    let isPlaying = false;
    let currentAudioUrl = "";
    let isDragging = false;
    let offsetX = 0;
    let offsetY = 0;

    // 🔹 初始化播放器
    function initPlayer() {
        // 设置默认音频源
        currentAudioUrl = "https://alive.cctv.com/live/cctv13/index.m3u8";
        audio.src = currentAudioUrl;
        playerSource.innerText = "默认：央视新闻";
    }

    // 🔹 播放控制核心
    function togglePlay(newUrl) {
        // 如果有新链接且不同，切换音频源
        if (newUrl && newUrl !== currentAudioUrl) {
            currentAudioUrl = newUrl;
            audio.src = newUrl;
            playerSource.innerText = getSourceName(newUrl);
        }

        if (!currentAudioUrl) return;

        if (isPlaying) {
            audio.pause();
            playerBtn.innerText = "▶";
            playerStatus.innerText = "状态：已暂停";
            isPlaying = false;
        } else {
            audio.play().then(() => {
                playerBtn.innerText = "⏸️";
                playerStatus.innerText = "状态：正在播放";
                isPlaying = true;
            }).catch(err => {
                playerStatus.innerText = "状态：播放失败";
                console.error("播放错误：", err);
            });
        }
    }

    // 🔹 根据链接获取显示名称
    function getSourceName(url) {
        if (url.includes("cctv")) return "央视新闻";
        if (url.includes("zaobao")) return "联合早报";
        if (url.includes("wsj")) return "华尔街日报";
        if (url.includes("ftchinese")) return "FT中文网";
        if (url.includes("reuters")) return "路透中文";
        return "未知来源";
    }

    // 🔹 拖拽功能实现
    function initDrag() {
        handle.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', stopDrag);
    }

    function startDrag(e) {
        isDragging = true;
        offsetX = e.clientX - player.getBoundingClientRect().left;
        offsetY = e.clientY - player.getBoundingClientRect().top;
        player.style.cursor = 'grabbing';
    }

    function drag(e) {
        if (!isDragging) return;
        const x = e.clientX - offsetX;
        const y = e.clientY - offsetY;
        
        // 限制在视口内
        const maxX = window.innerWidth - player.offsetWidth;
        const maxY = window.innerHeight - player.offsetHeight;
        
        player.style.left = Math.max(0, Math.min(x, maxX)) + 'px';
        player.style.top = Math.max(0, Math.min(y, maxY)) + 'px';
        player.style.right = 'auto'; // 取消right定位
    }

    function stopDrag() {
        isDragging = false;
        player.style.cursor = 'move';
    }

    // 🔹 监听所有报纸链接点击事件
    function initLinkListeners() {
        document.querySelectorAll('.item').forEach(item => {
            item.addEventListener('click', (e) => {
                e.preventDefault(); // 阻止默认跳转（如需打开新页请注释此行）
                const audioUrl = item.getAttribute('data-audio');
                togglePlay(audioUrl); // 切换并播放
            });
        });
    }

    // 🔹 页面加载完成后初始化
    window.onload = () => {
        initPlayer();
        initDrag();
        initLinkListeners();
    };
</script>

</body>
</html>
