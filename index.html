<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>便民服务中心</title>
<style>
/* 全局样式重置 */
* {margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",Arial,Helvetica,sans-serif;}
body {background:#f0f5ff;padding:20px 10px;}

/* 主容器卡片 */
.card {
  background:#fff;border-radius:22px;
  padding:32px 28px;max-width:340px;margin:0 auto;
  box-shadow:0 8px 26px rgba(120,140,180,0.13);
}

/* 标题区域 */
.title {
  font-size:22px;color:#3c4866;text-align:center;
  margin-bottom:34px;
}

/* 网格布局（所有按钮统一排列） */
.grid {
  display:grid;grid-template-columns:1fr 1fr;gap:8px;
}

/* 按钮通用样式 */
.btn {
  display:flex;align-items:center;justify-content:center;
  height:70px;border-radius:14px;text-decoration:none;
  font-size:16px;position:relative;
}

/* 主按钮样式（蓝色渐变） */
.btn-primary {
  background:linear-gradient(135deg,#8d97ff,#72b2ff);
  color:#fff;
}

/* 次按钮样式（白色边框） */
.btn-secondary {
  background:#fff;border:1px solid #d0d0d0;
  color:#5a5a5a;
}

/* 图标样式 */
.icon {
  width:22px;height:22px;
  stroke-width:2;stroke:currentColor;fill:none;
}

/* 红点提示样式 */
.badge::after {
  content:'';position:absolute;top:0;right:-7px;
  width:7px;height:7px;background:#ff4548;
  border-radius:50%;
}
</style>
</head>
<body>

<div class="card">
  <div class="title">便民服务中心</div>
  <div class="grid">

    <!-- 年卡办理 -->
    <a href=" " class="btn btn-primary badge">
      <svg class="icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20z"/>
      </svg>
      <span>年卡办理</span>
    </a >

    <!-- 公积金查询 -->
    <a href="#" class="btn btn-secondary badge">
      <svg class="icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20z"/>
      </svg>
      <span>公积金查询</span>
    </a >

    <!-- 医保服务 -->
    <a href="#" class="btn btn-primary badge">
      <svg class="icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20z"/>
      </svg>
      <span>医保服务</span>
    </a >

    <!-- 交管业务 -->
    <a href="#" class="btn btn-secondary badge">
      <svg class="icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20z"/>
      </svg>
      <span>交管业务</span>
    </a >

    <!-- 政务咨询 -->
    <a href="#" class="btn btn-primary badge">
      <svg class="icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20z"/>
      </svg>
      <span>政务咨询</span>
    </a >

    <!-- 票务服务 -->
    <a href="#" class="btn btn-secondary badge">
      <svg class="icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20z"/>
      </svg>
      <span>票务服务</span>
    </a >

    <!-- 天气查询 -->
    <a href="#" class="btn btn-primary badge">
      <svg class="icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20z"/>
      </svg>
      <span>天气查询</span>
    </a >

    <!-- 维权投诉 -->
    <a href="#" class="btn btn-secondary badge">
      <svg class="icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 2a10 10 0 1 1 0 20 10 10 0 0 1 0-20z"/>
      </svg>
      <span>维权投诉</span>
    </a >

  </div>
</div>

</body>
</html>
