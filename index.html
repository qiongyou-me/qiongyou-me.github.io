<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>穹游</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei",sans-serif}

html,body{
    width:100%;
    min-height:100vh;
    background:linear-gradient(135deg,#1a103f 0%,#2e1e70 35%,#43389f 70%,#5b4bd6 100%);
    color:#fff;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
}

.container{
    max-width:700px;
    width:100%;
    text-align:center;
}

h1{
    font-size:3.6rem;
    background:linear-gradient(90deg,#c0c0ff,#a0a0ff,#8080ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    margin-bottom:10px;
    letter-spacing:6px;
}

.slogan{
    font-size:1.2rem;
    color:#d0d0ff;
    margin-bottom:40px;
}

.card{
    background:rgba(255,255,255,0.06);
    border-radius:20px;
    padding:35px 30px;
    border:1px solid rgba(255,255,255,0.1);
    text-align:left;
    line-height:1.9;
    font-size:1.05rem;
    color:#f0f0ff;
    margin-bottom:30px;
}

.contact-box{
    background:rgba(255,255,255,0.07);
    border-radius:20px;
    padding:30px;
    border:1px solid rgba(255,255,255,0.12);
    text-align:center;
}

.contact-box h3{
    color:#e0e0ff;
    font-size:1.1rem;
    margin-bottom:18px;
}

.tel{
    font-size:1.2rem;
    font-weight:bold;
    color:#fff;
    margin:10px 0;
}

.tel a{
    color:#fff;
    text-decoration:none;
}

.footer{
    margin-top:35px;
    color:#b0b0ff;
    font-size:0.9rem;
}
</style>
</head>

<body>

<div class="container">
    <h1>穹游</h1>
    <div class="slogan">心怀苍穹 · 不逐浮华 · 行而不辍</div>

    <div class="card">
        <p>穹，是浩瀚无垠的天地，更是宽广通透的眼界与心界。</p >
        <p>游，是无拘无束的行走，也是不被定义的体验与探索。</p >
        <br>
        <p>穹游，就是挣脱世俗的捆绑，在广阔天地间找到自己的节奏；在行走中清醒，在体验中沉淀，在热爱中发光。</p >
        <p>不必被标准定义，不必被他人裹挟，不必困在方寸之地。</p >
        <p>看更广的世界，做更真的自己，活出自在、坦荡、热烈的一生。</p >
    </div>

    <div class="contact-box">
        <h3>联系人：曾先生</h3>
        <div class="tel"><a href=" ">📞 15641257522</a ></div>
        <div class="tel"><a href="tel:15724754436">📞 15724754436</a ></div>
    </div>

    <div class="footer">© 2026 穹游 · 广阔天地，自在人生</div>
</div>

</body>
</html>
