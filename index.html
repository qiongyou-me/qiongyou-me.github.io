<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>网页版应用导航</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        font-family: "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
        background: #050508; color: #e0e0e0;
        overflow-x: hidden; line-height: 1.6;
    }
    .glass {
        backdrop-filter: blur(18px) saturate(120%);
        -webkit-backdrop-filter: blur(18px);
        background: rgba(15, 15, 25, 0.85);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .header {
        position: fixed; top: 0; left: 0; width: 100%;
        padding: 22px 0; text-align: center;
        font-size: 26px; font-weight: 700;
        letter-spacing: 2px; z-index: 100;
        border-bottom: 1px solid rgba(138, 166, 255, 0.2);
    }
    .header span { color: #8AA6FF; }
    .container {
        max-width: 1400px; margin: 120px auto 80px;
        padding: 20px; display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 28px;
    }
    .card {
        padding: 30px; border-radius: 24px;
        position: relative; overflow: hidden;
        transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .card:hover {
        transform: translateY(-8px) scale(1.02);
        box-shadow: 0 0 45px rgba(138, 166, 255, 0.3),
                    inset 0 1px 0 rgba(255,255,255,0.15);
        border-color: rgba(138, 166, 255, 0.6);
    }
    .card::after {
        content: ""; position: absolute; top: 0; left: 0;
        width: 50%; height: 100%;
        background: linear-gradient(90deg, transparent,
                    rgba(138, 166, 255, 0.12) 50%, transparent);
        transition: all 0.9s ease; opacity: 0;
    }
    .card:hover::after { opacity: 1; left: 100%; }
    .card-title {
        font-size: 22px; font-weight: 700; margin-bottom: 28px;
        color: #fff; display: flex; align-items: center; gap: 14px;
    }
    .card-title::before {
        content: ""; display: inline-block;
        width: 6px; height: 28px; background: #8AA6FF;
        border-radius: 4px;
    }
    .item {
        display: block; padding: 18px 22px; margin: 16px 0;
        border-radius: 18px; color: #ccc;
        text-decoration: none; font-size: 16px;
        transition: all 0.25s; border: 1px solid transparent;
    }
    .item:active { transform: scale(0.97); background: rgba(138, 166, 255, 0.18); }
    .item:hover {
        color: #8AA6FF; border-color: rgba(138, 166, 255, 0.4);
        background: rgba(138, 166, 255, 0.1);
    }
</style>
</head>
<body>

<div class="header glass">网页版<span>应用导航</span></div>

<div class="container">

    <!-- 1. 🗞️ 全球中文报纸（专家精选） -->
    <div class="card glass">
        <div class="card-title">🌍 国际中文报纸</div>
        <a class="item" href=" " target="_blank">📄 中国日报（全球发行）</a >
        <a class="item" href="https://www.zaobao.com.sg" target="_blank">📄 联合早报（新加坡权威）</a >
        <a class="item" href="https://www.singtao.ca" target="_blank">📄 星岛日报（全球华语）</a >
    </div>

    <!-- 2. 📻 全球中文新闻（专家精选） -->
    <div class="card glass">
        <div class="card-title">🌐 国际中文新闻</div>
        <a class="item" href="https://www.dw.com/zh" target="_blank">🌐 德国之声（DW中文）</a >
        <a class="item" href="https://www.france24.com/zh" target="_blank">🌐 法国24（中文频道）</a >
        <a class="item" href="https://www.news.cn/world" target="_blank">🌐 新华网（国际频道）</a >
    </div>

    <!-- 3. 🎬 全球中文影视（专家精选） -->
    <div class="card glass">
        <div class="card-title">🎬 中文影视</div>
        <a class="item" href="https://www.youku.com" target="_blank">🎬 优酷</a >
        <a class="item" href="https://v.qq.com" target="_blank">🎬 腾讯视频</a >
        <a class="item" href="https://www.iq.com" target="_blank">🎬 爱奇艺</a >
        <a class="item" href="https://www.bilibili.com" target="_blank">🎬 B站</a >
    </div>

</div>

</body>
</html>
