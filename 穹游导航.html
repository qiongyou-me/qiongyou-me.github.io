<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>便民服务</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #f0f5ff;
  font-family: "Microsoft YaHei", sans-serif;
  padding: 20px 10px;
}
.card {
  background: #fff;
  border-radius: 22px;
  padding: 32px 28px;
  max-width: 340px;
  margin: 0 auto;
  box-shadow: 0 8px 26px rgba(120,140,180,0.13);
}
.title-box {
  text-align: center;
  margin-bottom: 34px;
}
.title {
  font-size: 22px;
  color: #3c4866;
  margin-bottom: 16px;
}
.title-line {
  width: 76px;
  height: 2px;
  margin: 0 auto;
  background: rgba(114,178,255,0.65);
  border-radius: 1px;
}
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}
.btn {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 10px;
  height: 70px;
  border-radius: 14px;
  font-size: 13px;
  text-decoration: none;
  white-space: nowrap;
  position: relative;
}
.btn-primary {
  background: linear-gradient(135deg, #8d97ff, #72b2ff);
  color: #fff;
}
.btn-secondary {
  background: #fff;
  border: 1px solid #D0D0D0;
  color: #5a5a5a;
}
.btn-secondary .icon {
  color: #6b88c7;
}
.icon {
  width: 22px;
  height: 22px;
  stroke-width: 2px;
  stroke: currentColor;
  fill: none;
  flex-shrink: 0;
}
.icon-light {
  stroke-width: 1.5px;
}
.icon-up {
  transform: translateY(-1px);
}
.badge::after {
  content: '';
  position: absolute;
  top: 0;
  right: -7px;
  width: 7px;
  height: 7px;
  background: #ff4548;
  border-radius: 50%;
  box-shadow: 0 1px 2px rgba(255,69,72,0.3);
}
</style>
</head>
<body>

<div class="card">
  <div class="title-box">
    <div class="title">便民服务</div>
    <div class="title-line"></div>
  </div>

  <div class="grid">
    <a class="btn btn-primary" href=" ">
      <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="3"></rect><line x1="3" y1="9" x2="21" y2="9"></line></svg>
      <span>年卡办理</span>
    </a >
    <a class="btn btn-secondary badge" href="#">
      <svg class="icon" viewBox="0 0 24 24"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
      <span>鞍山公积金</span>
    </a >

    <a class="btn btn-secondary badge" href="#">
      <svg class="icon icon-light" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      <span>鞍山医保局</span>
    </a >
    <a class="btn btn-secondary" href="#">
      <svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="7"></circle><line x1="12" y1="8" x2="12" y2="12"></line></svg>
      <span>鞍山交管122</span>
    </a >

    <a class="btn btn-primary" href="#">
      <svg class="icon icon-up" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg>
      <span>鞍山政务</span>
    </a >
    <a class="btn btn-secondary" href="#">
      <svg class="icon" viewBox="0 0 24 24"><path d="M12 2L3 9v12a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V9l-9-7z"></path></svg>
      <span>12306购票</span>
    </a >

    <a class="btn btn-secondary" href="#">
      <svg class="icon" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="2.56"></circle>
        <line x1="12" y1="2" x2="12" y2="5"></line>
        <line x1="12" y1="19" x2="12" y2="22"></line>
      </svg>
      <span>全国天气</span>
    </a >
    <a class="btn btn-secondary" href="#">
      <svg class="icon icon-light" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
      <span>12315维权</span>
    </a >
  </div>
</div>

</body>
</html>
